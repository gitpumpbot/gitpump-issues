name: Feature Request
description: Suggest an idea or improvement for GitPump
title: '[Feature] '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: Got an idea? We want to hear it.
  - type: textarea
    id: summary
    attributes:
      label: What would you like to see?
      placeholder: Describe the feature or improvement clearly
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Is this related to a limitation you ran into? Explain the context.
  - type: dropdown
    id: area
    attributes:
      label: Which area does this relate to?
      options:
        - Bot commands
        - Launch flow
        - Points system
        - gitpump.com website
        - SDK
        - Documentation
        - Other
    validations:
      required: true
